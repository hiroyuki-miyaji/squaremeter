<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>オサマール宅配BOX</title>

<style>

body{
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:#f4f6f8;
    margin:0;
    padding:30px 15px;
}

.container{
    max-width:420px;
    margin:auto;
    background:white;
    border-radius:12px;
    padding:30px;
    text-align:center;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

.title{
    font-size:22px;
    font-weight:600;
    margin-bottom:20px;
}

.status{
    font-size:15px;
    margin-bottom:10px;
    color:#444;
}

.pin{
    font-size:52px;
    font-weight:bold;
    letter-spacing:8px;
    color:#1976d2;
    margin:15px 0;
}

.message{
    margin-top:20px;
    font-size:14px;
    color:#555;
    line-height:1.7;
}

.error{
    color:#c62828;
    font-size:16px;
    line-height:1.6;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#999;
}

</style>

</head>

<body>

<div class="container">

<div class="title">オサマール宅配BOX</div>

<div id="status" class="status">
確認しています...
</div>

<div id="pin" class="pin"></div>

<div id="message" class="message"></div>

<div class="footer">
Osamal Delivery Box
</div>

</div>

<script>

//////////////////////////////////////////////////
// Logic Apps URL
//////////////////////////////////////////////////

const API_URL =
"https://prod-14.japaneast.logic.azure.com:443/workflows/b5bfd56892f145a9a533c603720ed37c/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=wIYjLIuj7dnU34BGayFV5pbTie6xNsH7lyMcAvuoneU";
// ↑ Logic Apps のURLに変更


//////////////////////////////////////////////////
// URLパラメータ取得
//////////////////////////////////////////////////

function getParam(name){

    const params = new URLSearchParams(window.location.search);
    return params.get(name);

}

//////////////////////////////////////////////////
// API呼び出し
//////////////////////////////////////////////////

async function loadPin(){

    const box = getParam("box");
    const key = getParam("key");

    if(!box || !key){

        document.getElementById("status").innerHTML =
        "<span class='error'>URLが正しくありません</span>";

        return;
    }

    try{

        const url =
        API_URL +
        "&box=" + encodeURIComponent(box) +
        "&key=" + encodeURIComponent(key);

        const res = await fetch(url);

        const data = await res.json();

        if(data.status === "open"){

            document.getElementById("status").innerHTML =
            "BOX番号 : " + box;

            document.getElementById("pin").innerHTML =
            data.pin;

            document.getElementById("message").innerHTML =
            "・暗証番号は一度しか表示されません。<br>" +
            "・必ず荷物を入れた後、扉を閉めてください。";

        }
        else{

            document.getElementById("status").innerHTML =
            "<span class='error'>申し訳ありません。<br>現在このBOXは解錠できません。</span>";

            document.getElementById("pin").innerHTML = "";
            document.getElementById("message").innerHTML = "";

        }

    }
    catch(e){

        document.getElementById("status").innerHTML =
        "<span class='error'>通信エラーが発生しました</span>";

    }

}

//////////////////////////////////////////////////
// 実行
//////////////////////////////////////////////////

loadPin();

</script>

</body>
</html>
