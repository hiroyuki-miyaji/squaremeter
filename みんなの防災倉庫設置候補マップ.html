<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みんなの防災倉庫候補地マップ</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
    }

    .controls {
        padding: 10px;
        background: #f4f4f4;
        display: flex;
        gap: 10px;
        align-items: center;
    }

    #address-input {
        padding: 8px;
        border: 1px solid #ccc;
        flex-grow: 3;
        max-width: 600px;
    }

    #search-button {
        padding: 8px 15px;
        background-color: #0078d4;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 4px;
    }

    /* --- PC 用レイアウト（デフォルト）--- */
    #map-container {
        display: flex;
        flex-direction: row; /* ← PC は横並び */
        height: calc(100vh - 140px);
        min-height: 400px;
        width: 100%;
        overflow: hidden;
    }

    #map {
        flex: 7;
        height: 100%;
    }

    #sidebar {
        flex: 3;
        height: 100%;
        overflow-y: auto;
        padding: 15px;
        border-left: 1px solid #ccc;
        background-color: #fff;
    }

    /* --- スマホ用（768px以下）--- */
    @media (max-width: 768px) {
        #map-container {
            flex-direction: column;  /* ← 縦並び */
            height: calc(100vh - 140px);
        }

        #map {
            width: 100%;
            height: 60vh;  /* ← 地図が0にならないように絶対値指定 */
        }

        #sidebar {
            width: 100%;
            height: 40vh;
            border-left: none;
            border-top: 1px solid #ccc;
        }
    }

    .suitable { color: #1e8449; font-weight: bold; }
    .unsuitable { color: #c0392b; font-weight: bold; }
    .conditional { color: #f39c12; font-weight: bold; }

    .candidate-item {
        border-bottom: 1px dashed #eee;
        padding: 8px 0;
        cursor: pointer;
    }

    .candidate-item:hover {
        background-color: #f9f9f9;
    }

    .disaster-links-popup a {
        display: block;
        margin-top: 5px;
        color: #0078d4;
        text-decoration: underline;
    }
</style>


</head>
<body>

<h2>みんなの防災倉庫候補地マップ</h2>
<a href="https://hiroyuki-miyaji.github.io/squaremeter/%E3%81%BF%E3%82%93%E3%81%AA%E3%81%AE%E9%98%B2%E7%81%BD%E5%80%89%E5%BA%AB%E3%83%AA%E3%82%AF%E3%82%A8%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%9E%E3%83%83%E3%83%97.html">みんなの防災倉庫リクエスターマップ<a/>
<div class="controls">
    <input type="text" id="address-input" placeholder="地図をクリックして地点を選択、または住所を入力してください">
    <button id="search-button">候補地を検索</button>
</div>

<div id="map-container">
    <div id="map"></div>
    <div id="sidebar">
        <h3>候補地一覧</h3>
        <div id="candidates-list">結果を検索するとここに表示されます。</div>
    </div>
</div>

<script>
let map;
let currentInfoWindow = null;
let markers = [];
const API_KEY = "AIzaSyCFsUzLKS7z-n6zAYK7gXf-mm6iVXGrT1A";

const LOGIC_APP_URL =
 "https://prod-47.japaneast.logic.azure.com:443/workflows/690c844c958e440b959b6723c69c5ef8/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=Gy1WOfIlVTGYqj1DsclsX0Uai1yZyugwuMdL425NOxU";

function getIconUrl(suitability) {
    const base = "https://maps.google.com/mapfiles/ms/icons/";
    if (suitability === "適合") return base + "green-dot.png";
    if (suitability === "不適合") return base + "red-dot.png";
    if (suitability === "条件付き") return base + "yellow-dot.png";
    return base + "blue-dot.png";
}

/* 📍 初期表示：GPS 取得 → 失敗したら東京駅 */
function initMap() {
	// 🔍 Enterキーで地図を中心に
	document.getElementById("address-input").addEventListener("keydown", (e) => {
		if (e.key === "Enter") {
			centerMapFromTextbox();
		}
	});

	// 🔍 フォーカスが外れた時も中心に
	document.getElementById("address-input").addEventListener("blur", () => {
		centerMapFromTextbox();
	});
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            const center = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            };
            createMap(center);
        },
        () => {
            createMap({ lat: 34.3911, lng: 132.4576 });
        }
    );
}

function createMap(center) {
    map = new google.maps.Map(document.getElementById("map"), {
        center,
        zoom: 13
    });

    placeCenterMarker(center);

    /* スマホ向け resize */
    setTimeout(() => {
        google.maps.event.trigger(map, "resize");
        map.setCenter(center);
    }, 500);

    document.getElementById("search-button").onclick = searchWarehouse;
    map.addListener("click", handleMapClick);
}

function placeCenterMarker(position) {
    new google.maps.Marker({
        position,
        map,
        title: "検索中心地",
        icon: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
    });
}

/* 📍クリックで逆ジオコーディング */
async function handleMapClick(event) {
    const latlng = event.latLng;
    const url = `https://maps.googleapis.com/maps/api/geocode/json?latlng=${latlng.lat()},${latlng.lng()}&key=${API_KEY}&language=ja`;

    document.getElementById("address-input").value = "住所を検索中...";

    const res = await fetch(url);
    const data = await res.json();

    if (data.results?.length > 0) {
        document.getElementById("address-input").value =
            data.results[0].formatted_address;
    }
}

async function searchWarehouse() {
    const address = document.getElementById('address-input').value.trim();
	//都道府県市区町村切り出し
    const parsed = parseJapaneseAddress(address);
    const payload = {
        address: address,
        prefecture: parsed.pref,
        city: parsed.city
    };	
	
    if (!address || address.includes("検索中") || address.includes("失敗")) {
        alert('有効な住所を入力または選択してください。');
        return;
    }
    
    document.getElementById('search-button').textContent = '検索中...';
    document.getElementById('candidates-list').innerHTML = 'データ取得中...';

    let data;

	try {
		const response = await fetch(LOGIC_APP_URL, {
			method: 'POST',
			headers: {
				'Content-Type': 'application/json'
			},
			body: JSON.stringify(payload)
		});

		if (!response.ok) {
			throw new Error(`HTTPエラー! ステータス: ${response.status}`);
		}

		const jsonText = await response.text();  // ← text() で受け取る

		let cleanJsonText = jsonText.trim();
		if (cleanJsonText.startsWith('"') && cleanJsonText.endsWith('"')) {
			cleanJsonText = cleanJsonText.slice(1, -1);
		}

		// 不要なエスケープ削除
		cleanJsonText = cleanJsonText.replace(/\\"/g, '"');

		// JSONに変換
		data = JSON.parse(cleanJsonText);

		if (Array.isArray(data)) {
			placeMarkers(data);
		} else {
			console.error("Unexpected response:", data);
			document.getElementById('candidates-list').innerHTML =
				`<p style="color:red;">データ形式が配列ではありません。</p>`;
			placeMarkers([]);
		}

	} catch (error) {
		console.error("Fetch/Parse error:", error);
		document.getElementById('candidates-list').innerHTML =
			`<p style="color:red;">データ取得に失敗しました。</p>`;
		placeMarkers([]);
	} finally {
		document.getElementById('search-button').textContent = '候補地を検索';
	}

}

function placeMarkers(locations) {
    markers.forEach((m) => m.setMap(null));
    markers = [];

    const listElement = document.getElementById("candidates-list");
    listElement.innerHTML = "";

    if (!locations.length) {
        listElement.textContent = "候補地が見つかりませんでした。";
        return;
    }

    map.panTo({ lat: parseFloat(locations[0].lat), lng: parseFloat(locations[0].lng) });
    map.setZoom(15);

    locations.forEach((loc, index) => {
        const pos = { lat: parseFloat(loc.lat), lng: parseFloat(loc.lng) };

        const marker = new google.maps.Marker({
            position: pos,
            map,
            title: loc.name,
            icon: getIconUrl(loc.suitability)
        });

        markers.push(marker);

        const infoHtml = `
        <div>
            <h3>${loc.name}</h3>
            <p><strong>住所:</strong> ${loc.address}</p>
            <p><strong>適性:</strong> ${loc.suitability}</p>
            <p>${loc.reason}</p>
            <p>${loc.stockpiles}</p>

            <hr>
            <strong>周辺防災情報:</strong><br>
            <a href="https://www.jma.go.jp/bosai/risk/#zoom:14/lat:${pos.lat}/lon:${pos.lng}" target="_blank">キキクル</a><br>
            <a href="https://disaportal.gsi.go.jp/hazardmap/maps/index.html?ll=${pos.lat},${pos.lng}&z=15&base=pale&ls=Disaster_lore_all&disp=1&vs=c1j0l0u0t0h0z0" target="_blank">過去の災害伝承碑</a><br>
			<a href="https://disaportal.gsi.go.jp/hazardmap/maps/index.html?ll=${pos.lat},${pos.lng}&z=15&base=pale&ls=tameike_raster%2C0.8%7Cnaisui_raster%2C0.8%7Cflood_l2_kaokutoukai_kagan%2C0.8%7Cflood_l2_kaokutoukai_hanran%2C0.8%7Cflood_l2_keizoku%2C0.8%7Cflood_list%2C0.8%7Cflood_l1%2C0.8%7Cflood_list_l2%2C0.75%7Cdosha_kiken_nadare%2C0.8%7Cdosha_keikai_jisuberi%2C0.8%7Cdosha_keikai_dosekiryu%2C0.8%7Cdosha_keikai_kyukeisha%2C0.8%7Ctakashio_sinsuisin_raster%2C0.8%7Cekijouka_zenkoku%2C0.8%7Ctsunamishinsui_raster%2C0.8%7Cdisaster1%7Cdisaster2%7Cdisaster3%7Cdisaster5&disp=1100000101111010000&vs=c1j0l0u0t0h0z0 target="_blank">ハザードマップ</a><br>
            <a href="https://disaportal.gsi.go.jp/hazardmap/maps/index.html?ll=${pos.lat},${pos.lng}&z=15&base=pale&ls=disaster1%7Cdisaster7%7Cdisaster5%7Cdisaster2%7Cdisaster4%7Cdisaster6%7Cdisaster8%7Cdisaster3&disp=00010000&vs=c1j0l0u0t0h0z0" target="_blank">指定緊急避難所</a><br>
            <a href="https://www.google.com/maps/search/避難所/@${pos.lat},${pos.lng},15z" target="_blank">Googlemap避難所検索</a><br>
            <!-- ★修正済み AED リンク -->
            <a href="https://aedm.jp/" target="_blank">近隣のAED</a><br>
            <!-- ★緯度経度入り 公衆電話リンク -->
            <a href="https://www.locationsmart.org/?tag=_collabo_phonebooth_ntt&lat=${pos.lat}&lon=${pos.lng}&z=18" target="_blank">
                公衆電話（最寄り）
            </a>
        </div>
        `;

        const iw = new google.maps.InfoWindow({ content: infoHtml });

        marker.addListener("click", () => {
            if (currentInfoWindow) currentInfoWindow.close();
            iw.open(map, marker);
            currentInfoWindow = iw;
        });

		const item = document.createElement("div");
		item.className = "candidate-item";

		const iconUrl = getIconUrl(loc.suitability);

		// 適性に応じた表示色クラス
		const suitabilityClass =
			loc.suitability === "適合"
				? "suitable"
				: loc.suitability === "不適合"
				? "unsuitable"
				: "conditional";

		item.innerHTML = `
			<div style="display:flex; gap:8px; align-items:flex-start;">
				<img src="${iconUrl}" width="20" height="20">

				<div>
					<strong>${index + 1}. ${loc.name}</strong><br>
					<span class="${suitabilityClass}">${loc.suitability}</span><br>
					<small>${loc.address}</small>
				</div>
			</div>
		`;

		item.onclick = () => {
			map.panTo(pos);
			map.setZoom(16);
			if (currentInfoWindow) currentInfoWindow.close();
			iw.open(map, marker);
			currentInfoWindow = iw;
		};

		listElement.appendChild(item);
    });
}
	/* 📌 テキストボックスの住所を地図中央に移動 */
	async function centerMapFromTextbox() {
		const address = document.getElementById("address-input").value.trim();
		if (!address) return;

		const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&key=${API_KEY}&language=ja`;

		try {
			const res = await fetch(url);
			const data = await res.json();

			if (data.results?.length > 0) {
				const loc = data.results[0].geometry.location;
				map.panTo({ lat: loc.lat, lng: loc.lng });
				map.setZoom(15);
			}
		} catch (e) {
			console.error("centerMapFromTextbox error:", e);
		}
	}
	
	function parseJapaneseAddress(input) {
		if (!input) return { pref: "", city: "" };

		let address = input.trim();

		// ① 不要ワード削除（国名・カンマ・全角空白）
		address = address
			.replace(/^日本[、,\s]*/i, "")
			.replace(/JP[、,\s]*/i, "")
			.replace(/[、,]/g, " ")  // カンマ → 半角スペース
			.replace(/\s+/g, " ");  // 連続スペースを 1 に

		// ② 郵便番号削除（〒699-2841 / 6992841 両方対応）
		address = address.replace(/〒?\d{3}-?\d{4}/g, "").trim();

		// ③ 都道府県抽出
		const prefRegex = /(北海道|東京都|京都府|大阪府|.{2,3}県)/;
		const prefMatch = address.match(prefRegex);
		let pref = prefMatch ? prefMatch[0] : "";

		// ④ 市区町村抽出
		let city = "";
		if (pref) {
			const remain = address.slice(address.indexOf(pref) + pref.length);
			const cityRegex = /(.*?[市区町村])/;
			const cityMatch = remain.match(cityRegex);
			if (cityMatch) city = cityMatch[1];
		}

		return { pref, city };
	}
	

</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCFsUzLKS7z-n6zAYK7gXf-mm6iVXGrT1A&callback=initMap"></script>
</body>
</html>
